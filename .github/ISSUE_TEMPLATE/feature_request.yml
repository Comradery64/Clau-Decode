name: Feature request
description: Suggest a new feature, enhancement, or improvement.
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Small, focused proposals are easiest to land. If you're not sure whether it fits the project's scope, that's fine — describe the underlying problem and we'll figure it out together.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the user-facing pain point or limitation, not just the feature.
      placeholder: "When I'm browsing sessions from last month, I can't…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would the ideal behavior look like? Sketch the UX, CLI flag, or API if it helps.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why they fall short.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true

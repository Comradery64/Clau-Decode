name: Bug report
description: Report something that's broken or behaving unexpectedly.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Steps to reproduce, expected behavior, and logs are helpful but optional.
      placeholder: When I click X, the app does Y instead of Z.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: Paste any tracebacks, console output, or errors (optional).
      render: shell
